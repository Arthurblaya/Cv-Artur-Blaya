<div class="side-index-shell" [class.is-open]="isOpen">
  <div class="side-index-controls">
    <button class="theme-toggle" type="button" (click)="onThemeToggle()">
      <span class="theme-icon" aria-hidden="true">{{ theme === 'dark' ? '☀' : '☾' }}</span>
      <span class="sr-only">{{ theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme' }}</span>
    </button>

    <button class="index-toggle" type="button" (click)="onToggle()">
      <span class="hamburger" [class.is-open]="isOpen" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span class="sr-only">{{ isOpen ? 'Close index' : 'Open index' }}</span>
    </button>
  </div>

  <div class="side-index-overlay" [class.is-open]="isOpen" (click)="onToggle()"></div>
  <aside class="side-index panel" [class.is-open]="isOpen" [attr.aria-hidden]="!isOpen">
    <p class="side-index-label">Index</p>
    <nav class="side-index-nav" aria-label="Page sections">
      @for (link of links; track link.id) {
        <a
          [href]="'#' + link.id"
          [class.is-active]="activeSectionId === link.id"
          [attr.aria-current]="activeSectionId === link.id ? 'true' : null"
          (click)="onNavigate()"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </aside>
</div>
